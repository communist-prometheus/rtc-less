name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Quality gate — lint, type-check, build all packages via Turborepo
  # -----------------------------------------------------------------------
  build:
    name: Lint, Type-check, Build (all packages)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint (Turbo)
        run: bunx turbo lint

      - name: Type-check (Turbo)
        run: bunx turbo type-check

      - name: Build (Turbo)
        run: bunx turbo build

  # -----------------------------------------------------------------------
  # E2E — Docker Compose network with signaling + TURN + browser peers
  # Only runs on Linux (requires Docker with bridge networking and NET_ADMIN)
  # -----------------------------------------------------------------------
  e2e:
    name: E2E Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: build
    # Only run E2E on push to main or when the PR targets main AND the label
    # "run-e2e" is present. Remove the condition below to always run E2E.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        working-directory: docker
        run: |
          docker compose -f compose.e2e.yml build \
            signaling \
            turn \
            telemetry \
            browser-a \
            browser-b \
            browser-c

      - name: Start infrastructure services
        # Start only signaling + TURN + telemetry + browser peers.
        # NAT gateways (nat-gw-a/b/c) are skipped for now because they require
        # kernel-level ip_forward sysctls that may not be available in all
        # GitHub-hosted runner environments. Add them back when self-hosted
        # runners with NET_ADMIN support are available.
        working-directory: docker
        run: |
          docker compose -f compose.e2e.yml up -d \
            signaling \
            turn \
            telemetry

      - name: Wait for signaling health-check
        working-directory: docker
        run: |
          docker compose -f compose.e2e.yml ps signaling
          # Compose health-check retries for up to 30 s (10 x 3 s interval).
          # Poll until the container reports healthy.
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose -f compose.e2e.yml ps -q signaling)" 2>/dev/null || echo "starting")
            echo "signaling health: $STATUS (attempt $i)"
            [ "$STATUS" = "healthy" ] && break
            sleep 3
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install E2E dependencies
        working-directory: e2e
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        env:
          SIGNALING_URL: http://localhost:8787
          SIGNALING_WS: ws://localhost:8787
          TURN_SERVER: localhost
          TURN_SECRET: rtc-less-e2e-test-secret
          TELEMETRY_URL: http://localhost:4318
        run: bunx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        working-directory: docker
        run: docker compose -f compose.e2e.yml down --volumes --remove-orphans
