name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint
        run: bunx turbo lint

      - name: Type-check
        run: bunx turbo type-check

      - name: Build
        run: bunx turbo build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        working-directory: docker
        run: docker compose -f compose.e2e.yml build signaling turn telemetry

      - name: Start services
        working-directory: docker
        run: docker compose -f compose.e2e.yml up -d signaling turn telemetry

      - name: Wait for signaling
        working-directory: docker
        run: |
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose -f compose.e2e.yml ps -q signaling)" 2>/dev/null || echo "starting")
            [ "$STATUS" = "healthy" ] && break
            sleep 3
          done

      - uses: oven-sh/setup-bun@v2

      - name: Install E2E deps
        working-directory: e2e
        run: bun install

      - name: Install Playwright
        working-directory: e2e
        run: bunx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: e2e
        env:
          SIGNALING_URL: http://localhost:8787
          SIGNALING_WS: ws://localhost:8787
          TURN_SERVER: localhost
          TURN_SECRET: rtc-less-e2e-test-secret
          TELEMETRY_URL: http://localhost:4318
        run: bunx playwright test --reporter=list

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        working-directory: docker
        run: docker compose -f compose.e2e.yml down --volumes --remove-orphans
