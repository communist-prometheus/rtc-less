name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint
        run: bunx turbo lint

      - name: Baseline browser-compat lint (self-test)
        run: bunx turbo lint:compat:self-test

      - name: Baseline browser-compat lint
        run: bunx turbo lint:compat

      - name: Type-check
        run: bunx turbo type-check

      - name: Build
        run: bunx turbo build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install workspace deps
        run: bun install

      - name: Install E2E deps
        working-directory: e2e
        run: bun install

      - name: Install Playwright
        working-directory: e2e
        run: bunx playwright install --with-deps chromium

      - name: Start signal server
        working-directory: packages/rtc-signal
        run: |
          bun --hot src/dev.ts > /tmp/signal.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8787/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8787/health

      - name: Start rtc-app dev server
        working-directory: packages/rtc-app
        run: |
          bun run dev > /tmp/app.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:4321/ > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:4321/ > /dev/null

      - name: Run E2E
        working-directory: e2e
        env:
          APP_URL: http://localhost:4321
          SIGNALING_URL: http://localhost:8787
        run: bunx playwright test --reporter=list

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== signal.log ==="
          cat /tmp/signal.log || true
          echo "=== app.log ==="
          cat /tmp/app.log || true
