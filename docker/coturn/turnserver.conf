# coturn configuration for E2E testing
listening-port=3478
tls-listening-port=5349

# Use lt-cred-mech with static auth secret
lt-cred-mech
use-auth-secret
static-auth-secret=rtc-less-e2e-test-secret

# Realm
realm=rtc-less.local

# Network
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Relay port range
min-port=49152
max-port=65535

# Logging
log-file=stdout
verbose

# No TLS for E2E tests (simplicity)
no-tls
no-dtls

# Allow loopback for Docker networking
no-loopback-peers=false
no-multicast-peers

# Disable CLI
no-cli
